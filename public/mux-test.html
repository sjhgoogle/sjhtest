<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single TS Player</title>
  </head>
  <body>
    <video id="video" controls autoplay></video>

    <!-- mux.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/mux.js@6.3.0/dist/mux.min.js"></script>

    <script>
      const TS_URL = "hi.ts"; // 여기에 ts 경로

      const video = document.getElementById("video");
      const mediaSource = new MediaSource();
      video.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener("sourceopen", async () => {
        const sb = mediaSource.addSourceBuffer(
          'video/mp4; codecs="avc1.42E01E, mp4a.40.2"',
        );

        const tsData = await fetch(TS_URL).then((r) => r.arrayBuffer());

        const transmuxer = new muxjs.mp4.Transmuxer();
        let mp4Segments = [];

        let init = "";
        let init2 = "";
        let cnt = 0;
        transmuxer.on("data", (segment) => {
          console.log("🚀 ~ segment:", segment);
          if (!init) {
            init = segment.initSegment;
            init2 = segment.data;

            mp4Segments.push(init);
            mp4Segments.push(init2);
          } else {
            mp4Segments.push(segment.initSegment);
            mp4Segments.push(segment.data);
          }
        });

        transmuxer.push(new Uint8Array(tsData));
        transmuxer.flush();

        const mp4 = concatBuffers(mp4Segments);
        sb.appendBuffer(mp4);
      });

      function concatBuffers(buffers) {
        let total = 0;
        buffers.forEach((b) => (total += b.byteLength));
        const out = new Uint8Array(total);
        let offset = 0;
        buffers.forEach((b) => {
          out.set(new Uint8Array(b), offset);
          offset += b.byteLength;
        });
        return out;
      }
    </script>
  </body>
</html>
