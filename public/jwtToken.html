    <h3>issure를 issuer로 고정으로 넣고있는데 넣는데이터에 {iss: "누구"} 처럼 중복 iss 넣으면 에러나서 서버쪽에서제거함</h3>

    <p>시크릿 벨류<input type="text" id="secret" value="19TvY5iQm8UXJd9YK4tOLmm6t6FotGQ5nRKoXtNZ9Uc" /></p>

    <p>JSON.parse(document.getElementById("logindata").value)</p>

    <button onclick="genToken()">acc 토큰생성</button>
    <textarea name="" id="logindata" cols="30" rows="10">
      '{\n  "id": "i1",\n  "pw": "pw1",\n  "sub": "USER_00000100",\n  "roles": "G",\n  "ttl": "1m"\n}'

    <pre id="tokens"></pre>

    <br />

    <button onclick="verifyToken()">토큰검증</button>
    <textarea name="" id="veriToken" cols="30" rows="10">
      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImlkMSIsInB3IjoicHcxIiwidHRsIjoiMW0iLCJzZWNyZXQiOiJzZWNyZXQiLCJpYXQiOjE2ODE2NTU3MjMsImV4cCI6MTY4MTY1NTc4MywiaXNzIjoiaXNzdWVyIn0.Gpl1XIRO1zVGWAnXUXN5Ta6imIgJAg6bueVFOXnJB6c
    </textarea>
    <pre id="veripre"></pre>

    <br />
    <br />
    <br />
    <br />

    <script>
      $(() => {
        const dd = {
          id: "id1",
          pw: "pw1",
          ttl: "1m",
          sub: "USER_00000100",
          // roles: "G",
        };
        $("#logindata").val(JSON.stringify(dd, null, 2));
        console.log(321);
      });

      async function verifyToken() {
        const { data } = await axios.post("/jwt/verifyToken", {
          accToken: $("#veriToken").val(),
          secret: $("#secret").val(),
        });
        console.log("🚀 ~ verifyToken ~ data:", data);

        $("#veripre").text(JSON.stringify(data, null, 2));
        if (data.msg === "성공") {
        }
      }
      async function genToken() {
        const { data } = await axios.post("/jwt/accToken", {
          ...JSON.parse(document.getElementById("logindata").value),
          secret: $("#secret").val(),
        });
        console.log("🚀 ~ genToken ~ data:", data);

        $("#tokens").append(JSON.stringify(data, null, 2));
        $("#tokens").append("\n");
      }
    </script>
